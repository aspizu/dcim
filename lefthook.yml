pre-commit:
  parallel: true
  jobs:
    - name: typecheck-cli
      glob: "cli/**/*.{py}"
      run: cd cli && ty check

    - name: lint-cli
      glob: "cli/**/*.{py}"
      run: cd cli && ruff check

    - name: typecheck-client
      glob: "packages/client/**/*.{ts,tsx}"
      run: pnpm --filter @dcim/client run check

    - name: typecheck-server
      glob: "packages/server/**/*.{ts}"
      run: pnpm --filter @dcim/server run check

    - name: lint-client
      glob: "packages/client/**/*.{ts,tsx}"
      run: pnpm --filter @dcim/client run lint

    - name: lint-server
      glob: "packages/server/**/*.{ts}"
      run: pnpm --filter @dcim/server run lint

    - name: wrangler-types
      glob: "wrangler.jsonc"
      run: pnpm wrangler types --check

    - name: format
      glob: "**/*.{ts,tsx,json,jsonc,yml,yaml,md,toml,css}"
      run: pnpm exec oxfmt --check {staged_files}

    - name: format-python
      glob: "**/*.{py}"
      run: ruff format --check {staged_files}
